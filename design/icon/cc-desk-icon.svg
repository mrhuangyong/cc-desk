<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- macOS squircle -->
    <path id="squircle" d="M 512 0 C 774 0 880 8 948 76 C 1016 144 1024 250 1024 512 C 1024 774 1016 880 948 948 C 880 1016 774 1024 512 1024 C 250 1024 144 1016 76 948 C 8 880 0 774 0 512 C 0 250 8 144 76 76 C 144 8 250 0 512 0 Z"/>

    <!-- 浅色暖纸背景 -->
    <radialGradient id="bg" cx="34%" cy="24%" r="95%">
      <stop offset="0%"  stop-color="#fdfaf3"/>
      <stop offset="50%" stop-color="#f4eee2"/>
      <stop offset="100%" stop-color="#e4dccd"/>
    </radialGradient>

    <!-- C 棱镜主体：深墨蓝 -->
    <linearGradient id="prism" x1="15%" y1="10%" x2="85%" y2="95%">
      <stop offset="0%"  stop-color="#33425a"/>
      <stop offset="42%" stop-color="#22304a"/>
      <stop offset="72%" stop-color="#16223a"/>
      <stop offset="100%" stop-color="#0c1424"/>
    </linearGradient>
    <!-- C 内侧暗面 -->
    <linearGradient id="prismDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#101a2c"/>
      <stop offset="100%" stop-color="#060b16"/>
    </linearGradient>

    <!-- 终端尖括号 < >：暖琥珀 -->
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffcf8a"/>
      <stop offset="50%" stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#a85c1c"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clip">
      <path d="M 512 0 C 774 0 880 8 948 76 C 1016 144 1024 250 1024 512 C 1024 774 1016 880 948 948 C 880 1016 774 1024 512 1024 C 250 1024 144 1016 76 948 C 8 880 0 774 0 512 C 0 250 8 144 76 76 C 144 8 250 0 512 0 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!--
      C 棱镜（开口朝右，半张角 40°）：
      外半径 300、内半径 196；端点坐标精确计算。
      外上(741.8,319.2) 外下(741.8,704.8) 内上(662.1,386.0) 内下(662.1,638.0)
    -->
    <!-- 暗面底（略大的内半径，留出厚度边） -->
    <path d="M 741.8 319.2
             A 300 300 0 1 0 741.8 704.8
             L 672.1 648.0
             A 210 210 0 1 1 672.1 376.0 Z"
          fill="url(#prismDark)"/>
    <!-- 亮面主体 -->
    <path d="M 741.8 319.2
             A 300 300 0 1 0 741.8 704.8
             L 662.1 638.0
             A 196 196 0 1 1 662.1 386.0 Z"
          fill="url(#prism)"/>

    <!-- C 外缘细高光（上半圈棱面反光） -->
    <path d="M 741.8 319.2 A 300 300 0 1 0 212 512"
          fill="none" stroke="#6e7d96" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round"/>

    <!-- 终端尖括号 < >（C 开口内侧，垂直居中对称） -->
    <!-- 左括号 <，尖朝左，顶点 (508,512) -->
    <path d="M 556 432 L 508 512 L 556 592"
          fill="none" stroke="url(#bracket)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 右括号 >，尖朝右，顶点 (716,512) -->
    <path d="M 668 432 L 716 512 L 668 592"
          fill="none" stroke="url(#bracket)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

    <rect width="1024" height="1024" fill="url(#sheen)"/>
  </g>

  <use href="#squircle" fill="none" stroke="#000000" stroke-opacity="0.12" stroke-width="2"/>
</svg>
