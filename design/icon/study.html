<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>cc-desk 图标方向探索</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=JetBrains+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0d10;
    color: #e8e6e1;
    font-family: 'Fraunces', serif;
    min-height: 100vh;
    padding: 64px 48px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  h1 {
    font-weight: 300;
    font-size: 54px;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  h1 em { font-style: italic; font-weight: 600; color: #e8a857; }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #6b6862;
    letter-spacing: 0.04em;
    margin-bottom: 56px;
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .cell {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .icon-box {
    width: 100%; aspect-ratio: 1; max-width: 320px;
    display: grid; place-items: center;
    background: radial-gradient(circle at 50% 30%, #1a1c22 0%, #0c0d10 70%);
    border-radius: 28px;
    padding: 28px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 24px 48px rgba(0,0,0,0.5)); }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #8a8680;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .label b { color: #e8a857; font-weight: 600; }
  .name {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    font-style: italic;
    color: #e8e6e1;
    margin-top: -8px;
  }
  .desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #5a574f;
    text-align: center;
    line-height: 1.6;
    max-width: 240px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>cc-desk <em>icon study</em></h1>
  <div class="sub">▸ three directions · squircle 1024 · macOS spec</div>

  <div class="grid">

    <!-- ========== 方向 A：终端指挥台 ========== -->
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- squircle 深墨蓝渐变 -->
            <radialGradient id="bgA" cx="38%" cy="30%" r="90%">
              <stop offset="0%" stop-color="#26303f"/>
              <stop offset="55%" stop-color="#161c27"/>
              <stop offset="100%" stop-color="#0a0e15"/>
            </radialGradient>
            <linearGradient id="ringA" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f0e9dc"/>
              <stop offset="100%" stop-color="#9a958a"/>
            </linearGradient>
            <radialGradient id="sparkA" cx="50%" cy="45%" r="60%">
              <stop offset="0%" stop-color="#ffd089"/>
              <stop offset="45%" stop-color="#e8a857"/>
              <stop offset="100%" stop-color="#b5702a"/>
            </radialGradient>
            <filter id="glowA" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="14"/>
            </filter>
            <!-- macOS squircle path -->
            <clipPath id="sqA">
              <path d="M 512 0 C 774 0 880 8 948 76 C 1016 144 1024 250 1024 512 C 1024 774 1016 880 948 948 C 880 1016 774 1024 512 1024 C 250 1024 144 1016 76 948 C 8 880 0 774 0 512 C 0 250 8 144 76 76 C 144 8 250 0 512 0 Z"/>
            </clipPath>
          </defs>

          <g clip-path="url(#sqA)">
            <rect width="1024" height="1024" fill="url(#bgA)"/>
            <!-- 细噪点纹理感：散布微点 -->
            <g opacity="0.5">
              <circle cx="180" cy="220" r="1.2" fill="#3a4456"/>
              <circle cx="820" cy="180" r="1" fill="#3a4456"/>
              <circle cx="760" cy="760" r="1.4" fill="#3a4456"/>
              <circle cx="240" cy="720" r="1" fill="#3a4456"/>
              <circle cx="500" cy="120" r="1.2" fill="#3a4456"/>
            </g>

            <!-- 抽象 C 形开口环（终端光标 ▸ 演化）-->
            <circle cx="512" cy="512" r="270" fill="none" stroke="url(#ringA)" stroke-width="46" stroke-linecap="round"
                    stroke-dasharray="1272 360" stroke-dashoffset="-180" transform="rotate(90 512 512)"/>
            <!-- 光标楔形：C 开口处的箭头 -->
            <path d="M 512 242 L 600 330 L 512 418 Z" fill="url(#ringA)"/>

            <!-- 中央暖琥珀光点（AI 火花 / 思考）-->
            <circle cx="512" cy="512" r="92" fill="url(#sparkA)" filter="url(#glowA)" opacity="0.85"/>
            <circle cx="512" cy="512" r="58" fill="url(#sparkA)"/>
            <circle cx="500" cy="498" r="20" fill="#fff4e0" opacity="0.7"/>
          </g>
        </svg>
      </div>
      <div class="label"><b>A</b> · terminal apex</div>
      <div class="name">Nocturne</div>
      <div class="desc">终端光标演化为开口 C 环，中央琥珀光点是 AI 思考的火花。夜间编程伙伴。</div>
    </div>

    <!-- ========== 方向 B：对话流 Desk ========== -->
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bgB" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#2a2520"/>
              <stop offset="100%" stop-color="#15110d"/>
            </linearGradient>
            <linearGradient id="flowB" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f5efe2"/>
              <stop offset="100%" stop-color="#d4a85a"/>
            </linearGradient>
            <clipPath id="sqB">
              <path d="M 512 0 C 774 0 880 8 948 76 C 1016 144 1024 250 1024 512 C 1024 774 1016 880 948 948 C 880 1016 774 1024 512 1024 C 250 1024 144 1016 76 948 C 8 880 0 774 0 512 C 0 250 8 144 76 76 C 144 8 250 0 512 0 Z"/>
            </clipPath>
          </defs>
          <g clip-path="url(#sqB)">
            <rect width="1024" height="1024" fill="url(#bgB)"/>
            <!-- 两条交汇流线 = 对话，形成 desk 桌面透视 -->
            <path d="M 256 340 C 420 340, 460 512, 512 512 C 564 512, 604 684, 768 684"
                  fill="none" stroke="url(#flowB)" stroke-width="52" stroke-linecap="round"/>
            <path d="M 768 340 C 604 340, 564 512, 512 512 C 460 512, 420 684, 256 684"
                  fill="none" stroke="url(#flowB)" stroke-width="52" stroke-linecap="round" opacity="0.42"/>
            <!-- 交汇节点 -->
            <circle cx="512" cy="512" r="46" fill="#fff4e0"/>
            <circle cx="512" cy="512" r="22" fill="#b5702a"/>
          </g>
        </svg>
      </div>
      <div class="label"><b>B</b> · dialogue flow</div>
      <div class="name">Confluence</div>
      <div class="desc">两条流线交汇于一点——人与 AI 的对话，desk 既是桌面也是交汇处。</div>
    </div>

    <!-- ========== 方向 C：棱镜 C ========== -->
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1a2230"/>
              <stop offset="100%" stop-color="#0a0f17"/>
            </linearGradient>
            <linearGradient id="prismC" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e6e6e8"/>
              <stop offset="100%" stop-color="#7a8090"/>
            </linearGradient>
            <linearGradient id="accentC" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e8a857"/>
              <stop offset="100%" stop-color="#c45f2a"/>
            </linearGradient>
            <clipPath id="sqC">
              <path d="M 512 0 C 774 0 880 8 948 76 C 1016 144 1024 250 1024 512 C 1024 774 1016 880 948 948 C 880 1016 774 1024 512 1024 C 250 1024 144 1016 76 948 C 8 880 0 774 0 512 C 0 250 8 144 76 76 C 144 8 250 0 512 0 Z"/>
            </clipPath>
          </defs>
          <g clip-path="url(#sqC)">
            <rect width="1024" height="1024" fill="url(#bgC)"/>
            <!-- 切角棱镜 C：厚描边的弧段 + 切角 -->
            <path d="M 700 300 A 280 280 0 1 0 700 724 L 620 640 A 168 168 0 1 1 620 384 Z"
                  fill="url(#prismC)"/>
            <!-- 内部折射出的终端括号 / 光束 -->
            <rect x="470" y="430" width="22" height="164" rx="11" fill="url(#accentC)" transform="rotate(20 481 512)"/>
            <rect x="540" y="430" width="22" height="164" rx="11" fill="url(#accentC)" transform="rotate(-20 551 512)"/>
          </g>
        </svg>
      </div>
      <div class="label"><b>C</b> · prism shard</div>
      <div class="name">Prism</div>
      <div class="desc">几何切角的 C 棱镜，折射出终端尖括号 &lt; &gt;。冷静、工程感。</div>
    </div>

  </div>
</div>
</body>
</html>
